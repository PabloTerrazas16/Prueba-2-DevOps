name: CI/CD Pipeline - Build & Deploy to ECR + EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Build images with Docker Compose
        run: |
          docker-compose build

      - name: Tag and Push images to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          DESPACHOS_REPO: ${{ secrets.DESPACHOS_ECR_REPO }}
          VENTAS_REPO: ${{ secrets.VENTAS_ECR_REPO }}
          FRONTEND_REPO: ${{ secrets.FRONTEND_ECR_REPO }}
        run: |
          docker tag despachos-api:latest $REGISTRY/$DESPACHOS_REPO:latest
          docker tag despachos-api:latest $REGISTRY/$DESPACHOS_REPO:${{ github.sha }}
          docker push $REGISTRY/$DESPACHOS_REPO:latest
          docker push $REGISTRY/$DESPACHOS_REPO:${{ github.sha }}

          docker tag ventas-api:latest $REGISTRY/$VENTAS_REPO:latest
          docker tag ventas-api:latest $REGISTRY/$VENTAS_REPO:${{ github.sha }}
          docker push $REGISTRY/$VENTAS_REPO:latest
          docker push $REGISTRY/$VENTAS_REPO:${{ github.sha }}


          docker tag front-despacho:latest $REGISTRY/$FRONTEND_REPO:latest
          docker tag front-despacho:latest $REGISTRY/$FRONTEND_REPO:${{ github.sha }}
          docker push $REGISTRY/$FRONTEND_REPO:latest
          docker push $REGISTRY/$FRONTEND_REPO:${{ github.sha }}

  deploy-to-ec2:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      DESPACHOS_IMG: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ secrets.DESPACHOS_ECR_REPO }}:latest
      VENTAS_IMG: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ secrets.VENTAS_ECR_REPO }}:latest
      FRONTEND_IMG: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ secrets.FRONTEND_ECR_REPO }}:latest
      DEPLOY_METHOD: ${{ secrets.DEPLOY_METHOD }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        if: env.DEPLOY_METHOD == 'SSH'
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}

        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_rsa $USER@$HOST << 'EOF'
            # Configure AWS credentials
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}"
            export AWS_DEFAULT_REGION="${{ env.AWS_REGION }}"
            
            if ! command -v docker-compose &> /dev/null; then
              echo "Installing docker-compose..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
            fi
            
            # Login to ECR
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin ${{ env.REGISTRY }}
            
            # Navigate to deployment directory
            cd /opt/app || mkdir -p /opt/app && cd /opt/app
            
            # Download docker-compose.yml from repository
            curl -sS https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml -o docker-compose.yml
            
            # Set environment variables for docker-compose
            export DESPACHOS_IMG=${{ env.DESPACHOS_IMG }}
            export VENTAS_IMG=${{ env.VENTAS_IMG }}
            export FRONTEND_IMG=${{ env.FRONTEND_IMG }}
            
            # Update images and deploy
            sudo -E docker-compose pull
            sudo -E docker-compose down || true
            sudo -E docker-compose up -d
            
            # Cleanup old images
            sudo docker image prune -f
          EOF

      - name: Deploy via SSM
        if: env.DEPLOY_METHOD == 'SSM'
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}",
              "export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}",
              "export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}",
              "export AWS_DEFAULT_REGION=${{ env.AWS_REGION }}",
              "command -v docker-compose || (curl -L https://github.com/docker/compose/releases/download/v2.20.3/docker-compose-$(uname -s)-$(uname -m) -o /usr/local/bin/docker-compose && chmod +x /usr/local/bin/docker-compose && ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose)",
              "aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin ${{ env.REGISTRY }}",
              "mkdir -p /opt/app && cd /opt/app",
              "curl -sS https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml -o docker-compose.yml",
              "export DESPACHOS_IMG=${{ env.DESPACHOS_IMG }}",
              "export VENTAS_IMG=${{ env.VENTAS_IMG }}",
              "export FRONTEND_IMG=${{ env.FRONTEND_IMG }}",
              "sudo -E docker-compose pull",
              "sudo -E docker-compose down || true",
              "sudo -E docker-compose up -d",
              "sudo docker image prune -f"
            ]' \
            --region ${{ env.AWS_REGION }}
